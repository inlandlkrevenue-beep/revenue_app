<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile Security Training</title>
  <style>
    :root {
      color: #f5f8ff;
      background: #071a3c;
      font-family: Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background: linear-gradient(120deg, #061226, #09265a);
      display: flex;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    .panel {
      background: rgba(8, 26, 65, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      max-width: 430px;
      padding: 28px;
      text-align: center;
      width: 100%;
    }

    .eyebrow {
      color: rgba(228, 236, 250, 0.72);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      font-size: 24px;
      margin: 12px 0;
    }

    p {
      color: rgba(228, 236, 250, 0.78);
      line-height: 1.6;
    }

    .notice {
      border-radius: 8px;
      margin-top: 16px;
      padding: 12px;
    }

    .success {
      background: rgba(4, 120, 87, 0.26);
      border: 1px solid rgba(134, 239, 172, 0.28);
      color: #86efac;
    }

    .error {
      background: rgba(180, 35, 24, 0.22);
      border: 1px solid rgba(254, 202, 202, 0.28);
      color: #fecaca;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">Email Security Campaign</div>
    <h1>Mobile Training Checkpoint</h1>
    <p>Your mobile view will be recorded for this approved security awareness exercise.</p>
    <div id="successBox" class="notice success" hidden>Thank you. You may close this page.</div>
    <div id="errorBox" class="notice error" hidden>Mobile token is missing.</div>
  </main>

  <script>
    const API_BASE_URL = 'https://survey.mclarens.lk/sc/public/api';
    const params = new URLSearchParams(window.location.search);
    const mobileToken = params.get('mobile_token') || '';
    const successBox = document.getElementById('successBox');
    const errorBox = document.getElementById('errorBox');

    if (!mobileToken) {
      errorBox.hidden = false;
      successBox.hidden = true;
    } else {
      successBox.hidden = false;
      fetch(API_BASE_URL + '/track-mobile.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mobile_token: mobileToken })
      }).catch(() => {});
    }
  </script>
</body>
</html>
